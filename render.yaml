services:
  - type: web
    name: sismo-v2
    runtime: python
    region: oregon
    plan: starter
    rootDir: .
    buildCommand: |
      cd frontend && npm install && npm run build && cd .. && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: sismo-v2
      - key: JWT_SECRET
        sync: false
      - key: ALEGRA_EMAIL
        sync: false
      - key: ALEGRA_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TOOL_USE_ENABLED
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
